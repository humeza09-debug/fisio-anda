<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testimoni Pasien - Fisioterapi Anda</title>

<style>

:root {
  --blue-dark:#457b9d;
  --blue-light:#caf0f8;
  --green-dark:#219653;
  --white:#ffffff;
  --gray-light:#f5f5f5;
  --text-dark:#1a1a1a;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--gray-light);
  color:var(--text-dark);
}

/* ===== HEADER ===== */
header{
background:#457b9d;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
}

.logo-title a{
display:flex;
align-items:center;
text-decoration:none;
}

.logo-title img{
height:60px;
margin-right:12px;
border-radius:8px;
}

.logo-title h1{
margin:0;
font-size:26px;
color:white;
}

nav a{
text-decoration:none;
color:white;
margin-left:20px;
font-weight:bold;
}

nav a:hover{
color:#caf0f8;
}


/* ===== HERO SECTION ===== */
.hero {
  background: linear-gradient(135deg, var(--blue-light), var(--green-dark));
  position: relative;
  padding: 60px 40px;
  text-align: center;
  color: var(--white);
  border-radius: 0 0 30px 30px;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 400px;
  height: 900px;
  background-image: url('image/Logo Fisioterapi And.png');
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  opacity: 0.25;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 0;
}

.hero h2,
.hero p {
  position: relative;
  z-index: 1;
}

.hero h2 { font-size: 36px; margin-bottom: 15px; }
.hero p { font-size: 18px; }

/* FORM */

.testimonial-form{
  max-width:800px;
  margin:40px auto;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.testimonial-form input,
.testimonial-form textarea,
.testimonial-form select{
  width:100%;
  padding:10px;
  margin-bottom:20px;
  border-radius:6px;
  border:1px solid #ccc;
}

.testimonial-form button{
  background:var(--green-dark);
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:8px;
  cursor:pointer;
}

.testimonial-form button:hover{
  background:#176c42;
}

/* TESTIMONI */

.testimonials{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  padding:60px 40px;
}

@media(max-width:900px){
  .testimonials{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:600px){
  .testimonials{grid-template-columns:1fr;}
}

.testimonial-card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.author{
  text-align:right;
  font-weight:bold;
  margin-top:10px;
}

.rating{
  color:#f4b400;
  margin-top:10px;
}

/* FOOTER */

footer {
    background-color: var(--blue-light);
    padding: 20px 40px;
    text-align: center;
    color: var(--text-dark);
  }

  footer a {
    color: var(--text-dark);
    text-decoration: none;
    font-weight: bold;
    margin: 0 10px;
  }

</style>
</head>

<body>

<header>

<div class="logo-title">
<a href="index.html">
<img src="image/Logo Fisioterapi And.png" alt="Logo Fisioterapi">
<h1>Fisioterapi Anda</h1>
</a>
</div>

<nav>
<a href="index.html">Beranda</a>
<a href="testimoni.html">Testimoni</a>
<a href="testimoni-pasien.html">Patient Testimoni</a>
<a href="kontak.html">Kontak</a>
</nav>

</header>


<section class="hero">
<h2>Berikan Testimoni Anda</h2>
<p>Kami ingin mendengar pengalaman Anda dengan layanan homecare kami.</p>
</section>


<section class="testimonial-form">

<h3>Isi Testimoni & Rating</h3>

<input type="text" id="name" placeholder="Nama lengkap Anda">

<textarea id="testimonial" placeholder="Tulis pengalaman Anda..."></textarea>

<select id="rating">
<option value="">Pilih rating</option>
<option value="⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐ (Sangat Puas)</option>
<option value="⭐⭐⭐⭐">⭐⭐⭐⭐ (Puas)</option>
<option value="⭐⭐⭐">⭐⭐⭐ (Cukup)</option>
<option value="⭐⭐">⭐⭐ (Kurang)</option>
<option value="⭐">⭐ (Tidak Puas)</option>
</select>

<button onclick="kirimTestimoni()">Kirim Testimoni</button>

</section>


<section class="testimonials" id="daftarTestimoni"></section>


<footer>
© Fisioterapi Anda | <a href="kontak.html">Kontak Kami</a>
</footer>


<script>

function kirimTestimoni(){

let nama = document.getElementById("name").value;
let pesan = document.getElementById("testimonial").value;
let rating = document.getElementById("rating").value;

if(nama=="" || pesan=="" || rating==""){
alert("Silakan isi semua kolom");
return;
}

let data={
nama:nama,
pesan:pesan,
rating:rating
};

let semuaTestimoni = JSON.parse(localStorage.getItem("testimoni")) || [];

semuaTestimoni.push(data);

localStorage.setItem("testimoni", JSON.stringify(semuaTestimoni));

/* pindah ke halaman proses */
window.location.href="proses-testimoni.html";

}

</script>

</body>
</html>
