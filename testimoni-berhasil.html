<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testimoni Berhasil Dikirim</title>

<style>

:root{
--blue-dark:#457b9d;
--blue-light:#caf0f8;
--green:#219653;
}

body{
font-family:Arial, sans-serif;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,var(--blue-light),var(--blue-dark));
}

/* kotak utama */

.box{
background:white;
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
max-width:420px;
animation:fadeIn 1s ease;
}

/* animasi muncul */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* icon centang */

.check{
width:80px;
height:80px;
border-radius:50%;
background:var(--green);
display:flex;
justify-content:center;
align-items:center;
margin:auto;
font-size:40px;
color:white;
animation:pop 0.5s ease;
}

@keyframes pop{
0%{transform:scale(0);}
80%{transform:scale(1.2);}
100%{transform:scale(1);}
}

h2{
margin-top:20px;
color:var(--green);
}

p{
color:#444;
margin-top:10px;
line-height:1.5;
}

/* tombol */

.button-group{
margin-top:25px;
}

button{
padding:10px 22px;
margin:5px;
border:none;
border-radius:8px;
background:var(--blue-dark);
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2c5d78;
transform:scale(1.05);
}

.info{
margin-top:15px;
font-size:13px;
color:#777;
}

</style>
</head>

<body>

<div class="box">

<div class="check">✔</div>

<h2>Testimoni Berhasil Dikirim</h2>

<p>
Terima kasih telah memberikan testimoni untuk layanan fisioterapi kami.
Pendapat Anda sangat membantu meningkatkan kualitas pelayanan kami.
</p>

<div class="button-group">
<button onclick="beranda()">Kembali ke Beranda</button>
<button onclick="lihatTestimoni()">Lihat Testimoni</button>
</div>

<div class="info">
Anda akan diarahkan ke beranda dalam <span id="timer">5</span> detik.
</div>

</div>

<script>

function beranda(){
window.location.href="index.html";
}

function lihatTestimoni(){
window.location.href="testimoni.html";
}

/* countdown otomatis */

let waktu = 5;
let hitung = document.getElementById("timer");

let interval = setInterval(function(){

waktu--;
hitung.innerHTML = waktu;

if(waktu <= 0){
clearInterval(interval);
window.location.href="index.html";
}

},1000);

</script>

</body>
</html>
